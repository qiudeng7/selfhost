services:
  # ==================== RSSHub ====================
  rsshub:
    image: diygod/rsshub:latest
    container_name: rsshub
    restart: unless-stopped
    # 不暴露端口，仅供内部 FreshRSS 访问
    environment:
      NODE_ENV: production
      # Puppeteer 配置
      PUPPETEER_WS_ENDPOINT: 'ws://browserless:3000'
      # GitHub Token（可选，推荐配置以提高 GitHub 路由稳定性）
      # GITHUB_ACCESS_TOKEN: 'your_github_token_here'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:1200/healthz']
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - browserless

  # ==================== FreshRSS ====================
  freshrss:
    image: freshrss/freshrss:latest
    container_name: freshrss
    hostname: freshrss
    restart: unless-stopped
    ports:
      - '8080:80'
    volumes:
      - freshrss-data:/var/www/FreshRSS/data
      - freshrss-extensions:/var/www/FreshRSS/extensions
      # 挂载 Catppuccin 主题文件
      - ./themes/catppuccin-mocha.css:/var/www/FreshRSS/themes/catppuccin-mocha.css:ro
    environment:
      TZ: Asia/Shanghai
      CRON_MIN: '3,33'
      TRUSTED_PROXY: 172.16.0.1/12 192.168.0.1/16
    healthcheck:
      test: ["CMD", "cli/health.php"]
      timeout: 10s
      start_period: 60s
      start_interval: 11s
      interval: 75s
      retries: 3

  # ==================== Browserless (Puppeteer 服务) ====================
  browserless:
    image: browserless/chrome
    container_name: browserless
    restart: unless-stopped
    ulimits:
      core:
        hard: 0
        soft: 0
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/pressure']
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  freshrss-data:
  freshrss-extensions:
